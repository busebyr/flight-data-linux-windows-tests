name: Linux Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Python kur
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      - name: Sistem bagımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 xvfb libxcb-xinerama0 libegl1 libopengl0 libxcb-cursor0
      - name: Kütüphaneleri kur
        run: pip install -r requirements.txt
      - name: Analiz motoru testi
        run: |
          xvfb-run python -c "
          import analiz_motoru
          print('OK: analiz_motoru')
          "
      - name: GUI testi
        run: |
          xvfb-run python -c "
          import sys
          import os
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'
          from PyQt6.QtWidgets import QApplication
          import analiz_motoru
          app = QApplication(sys.argv)
          print('OK: GUI ve analiz_motoru birlikte calisti')
          "
      - name: Grafik testi
        run: |
          xvfb-run python -c "
          import os
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'
          import matplotlib
          matplotlib.use('Agg')
          import pandas as pd
          import numpy as np
          from analiz_motoru import dosyalari_yukle, grafikleri_ciz, ortak_zaman_ekseni, veriyi_hizala

          # Sahte CSV olustur
          import tempfile, os
          tmp = tempfile.mkdtemp()
          csv_icerik = 'header\nzaman\tvalue\n0\t1.0\n1000000\t2.0\n2000000\t3.0\n3000000\t4.0\n'
          with open(os.path.join(tmp, 'test.csv'), 'w') as f:
              f.write(csv_icerik)

          # Dosya yukle
          veriler = dosyalari_yukle(tmp, ['test.csv'])
          print('OK: dosya yuklendi')

          # Ortak zaman ekseni
          t = ortak_zaman_ekseni(veriler)
          print(f'OK: ortak zaman ekseni {len(t)} nokta')

          # Grafik ciz
          parametre_map = {1: ('test.csv', 'value')}
          fig, lines, data, uyarilar = grafikleri_ciz(veriler, parametre_map, 'realtime', 1)
          print(f'OK: grafik cizildi, {len(lines)} line')
          "
      - name: Unit testler
        run: |
           xvfb-run python -m pytest tests/ -v
 
